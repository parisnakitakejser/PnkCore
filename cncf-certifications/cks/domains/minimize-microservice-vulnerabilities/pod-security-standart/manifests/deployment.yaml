apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpine
  namespace: pod-security-standart
  labels:
    app: alpine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpine
  template:
    metadata:
      labels:
        app: alpine
    spec:
      containers:
      - name: alpine
        image: alpine
        command:
          - sh
          - -c
          - |
            echo "Sleeping in 3600 sec..."
            sleep 3600