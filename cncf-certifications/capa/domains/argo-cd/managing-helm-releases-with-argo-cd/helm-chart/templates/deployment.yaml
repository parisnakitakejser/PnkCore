apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argocd-example-app.fullname" . }}
  labels:
    {{- include "argocd-example-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "argocd-example-app.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "argocd-example-app.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "argocd-example-app.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
