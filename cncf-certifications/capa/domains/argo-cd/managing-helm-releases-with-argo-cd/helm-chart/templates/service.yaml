apiVersion: v1
kind: Service
metadata:
  name: {{ include "argocd-example-app.fullname" . }}-service
  labels:
    {{- include "argocd-example-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "argocd-example-app.labels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
