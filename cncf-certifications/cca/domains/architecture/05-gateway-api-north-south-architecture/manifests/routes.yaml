apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: request-header
spec:
  parentRefs:
    - name: cilium-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /request-header
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: x-cilium-student
                value: architecture-lab
      backendRefs:
        - name: echo-v1
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: response-header
spec:
  parentRefs:
    - name: cilium-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /response-header
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: x-cilium-response
                value: gateway-api
      backendRefs:
        - name: echo-v1
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rewrite
spec:
  parentRefs:
    - name: cilium-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /rewrite
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /headers
      backendRefs:
        - name: echo-v1
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect
spec:
  parentRefs:
    - name: cilium-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /old
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /new
            statusCode: 302
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mirror
spec:
  parentRefs:
    - name: cilium-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mirror
      filters:
        - type: RequestMirror
          requestMirror:
            backendRef:
              name: echo-v2
              port: 8080
      backendRefs:
        - name: echo-v1
          port: 8080

