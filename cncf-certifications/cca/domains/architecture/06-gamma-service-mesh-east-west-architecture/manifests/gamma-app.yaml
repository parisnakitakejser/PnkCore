apiVersion: v1
kind: Namespace
metadata:
  name: gamma
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: gamma
spec:
  selector:
    app: echo
  ports:
    - name: http
      port: 80
      targetPort: 8080
      appProtocol: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-v1
  namespace: gamma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
      version: v1
  template:
    metadata:
      labels:
        app: echo
        version: v1
    spec:
      containers:
        - name: echo
          image: ealen/echo-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-v1
  namespace: gamma
spec:
  selector:
    app: echo
    version: v1
  ports:
    - name: http
      port: 80
      targetPort: 8080
      appProtocol: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-v2
  namespace: gamma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
      version: v2
  template:
    metadata:
      labels:
        app: echo
        version: v2
    spec:
      containers:
        - name: echo
          image: ealen/echo-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-v2
  namespace: gamma
spec:
  selector:
    app: echo
    version: v2
  ports:
    - name: http
      port: 80
      targetPort: 8080
      appProtocol: http
---
apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: gamma
spec:
  containers:
    - name: client
      image: curlimages/curl:8.15.0
      command: ["sh", "-c", "sleep 3600"]
