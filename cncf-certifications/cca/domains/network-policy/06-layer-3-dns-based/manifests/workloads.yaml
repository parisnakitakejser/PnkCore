apiVersion: "v1"
kind: "Namespace"
metadata:
  name: "l3-lab"
---
apiVersion: "v1"
kind: "Pod"
metadata:
  name: "client"
  namespace: "l3-lab"
  labels:
    role: "client"
spec:
  containers:
    - name: "client"
      image: "curlimages/curl:8.8.0"
      command:
        - "sh"
        - "-c"
        - "sleep 365d"
