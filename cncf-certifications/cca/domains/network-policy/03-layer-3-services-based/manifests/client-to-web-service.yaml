apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: client-to-web-service
spec:
  endpointSelector:
    matchLabels:
      role: client
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toServices:
        - k8sService:
            serviceName: web
            namespace: l3-lab
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
